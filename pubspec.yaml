publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  go_router: ^15.1.2
  google_fonts: ^6.2.1
  intl: ^0.20.2
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  flutter_staggered_grid_view: ^0.7.0
  smooth_page_indicator: ^1.2.1
  http: ^1.4.0
  socket_io_client: ^3.1.2
  google_maps_flutter: ^2.12.3
  geolocator: ^14.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
